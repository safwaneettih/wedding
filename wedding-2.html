<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صفوان و منال · دعوة الزفاف</title>
<meta name="description" content="دعوة زفاف صفوان و منال — 06-07 أوت 2026، تونس." />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Jost",system-ui,sans-serif;background:#FAF8F5;color:#1B3A5C;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .loader{width:40px;height:40px;border:2px solid rgba(27,58,92,.2);border-top-color:#1B3A5C;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1.5rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{font-size:.86rem;color:#8A9AB0;font-weight:400}
  .lock{font-size:2rem;margin-bottom:1rem;opacity:.3}
</style>
</head>
<body>
<div>
  <div class="loader"></div>
  <p>جارٍ التحميل...</p>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey:"AIzaSyBbV2S-1VHxx4op16jrmtnVT4h-sCOyj-Y",
  authDomain:"wedding-invitation-e2755.firebaseapp.com",
  projectId:"wedding-invitation-e2755",
  storageBucket:"wedding-invitation-e2755.firebasestorage.app",
  messagingSenderId:"132995136347",
  appId:"1:132995136347:web:d72c521ee17d759703787e"
};

const DESIGNS = {
  "v7": "index-v7.html",
  "v7-wtia": "v7-wtia.html",
  "none": null
};

try {
  const app = initializeApp(FIREBASE_CONFIG);
  const db = getFirestore(app);
  const snap = await getDoc(doc(db,"wedding","config"));
  let design = "none";
  if(snap.exists()){
    design = snap.data().active_design_2 || "none";
  }
  const file = DESIGNS[design];
  if(file){
    window.location.replace(file);
  } else {
    document.querySelector("body > div").innerHTML = '<div class="lock">🔒</div><p>الدعوة غير متاحة حالياً</p>';
  }
} catch(e) {
  document.querySelector("body > div").innerHTML = '<div class="lock">🔒</div><p>الدعوة غير متاحة حالياً</p>';
}
</script>
</body>
</html>
